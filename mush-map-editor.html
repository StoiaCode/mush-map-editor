<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUSH Map Editor</title>

<meta name="description" content="A single-file editor for documenting tile-based, multi-level MUSH maps. Flat grid and 3D views, zones, search and pathfinding.">
<meta name="theme-color" content="#5b9dff">

<!-- Open Graph / link embeds (Discord, Slack, etc.). To get a preview image,
     set og:url and og:image below to absolute URLs on your own host. -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="MUSH Map Editor">
<meta property="og:title" content="MUSH Map Editor">
<meta property="og:description" content="Hand-document tile-based, multi-level MUSH maps. Flat grid and 3D views, zones, search and pathfinding, all from a single HTML file.">
<meta property="og:url" content="https://map.stoia.red/">
<!-- <meta property="og:image" content="https://your-host.example/og-image.png"> -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="MUSH Map Editor">
<meta name="twitter:description" content="Hand-document tile-based, multi-level MUSH maps in a single HTML file.">

<!-- Inline SVG favicon (keeps the app self-contained) -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2314161c'/><g fill='none' stroke='%23353d4a' stroke-width='1.5'><path d='M11,4V28M21,4V28M4,11H28M4,21H28'/></g><rect x='13' y='13' width='6' height='6' rx='1.5' fill='%235b9dff'/></svg>">

<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="title">🗺️ MUSH Map Editor</span>

    <div class="seg" id="viewseg">
      <button data-view="flat" class="active">Flat</button>
      <button data-view="3d">3D</button>
    </div>

    <span id="layerctl">
      <button class="iconbtn" id="layerDown" title="Go down a layer">▼</button>
      <span id="layerLabel">Layer 0</span>
      <button class="iconbtn" id="layerUp" title="Go up a layer">▲</button>
    </span>

    <span class="seg">
      <button class="iconbtn" id="undoBtn" title="Undo (Ctrl+Z)">↶</button>
      <button class="iconbtn" id="redoBtn" title="Redo (Ctrl+Y)">↷</button>
    </span>

    <button id="linkBtn" title="Link mode: click a room, change layers if needed, then click the target. (Shift-drag links rooms on the same layer.)">🔗 Link</button>
    <button id="pathBtn" title="Pathfinder: click the start room, then the destination. Shows the shortest route as directions.">🧭 Path</button>
    <button id="areaBtn" title="Area mode: drag empty space to draw a zone rectangle. Spans all layers. Click an area to move/resize/edit it.">▭ Area</button>
    <button id="legendBtn" title="Color-tag legend: name what each colour means.">🏷 Legend</button>
    <button id="onionBtn" title="Onion-skin: show neighbour layers ghosted through.">👁 Onion</button>
    <button id="statsBtn" title="Map statistics: room counts by layer, colour and area.">📊 Stats</button>
    <input type="text" id="searchBox" placeholder="🔍 Search rooms…">
    <span id="searchInfo" class="statuschip"></span>
    <span id="linkHint" class="statuschip" style="display:none;color:var(--good)"></span>

    <span id="zoomctl">
      <button class="iconbtn" id="zoomOut">−</button>
      <span class="statuschip" id="zoomLabel">100%</span>
      <button class="iconbtn" id="zoomIn">+</button>
      <button id="zoomReset" title="Reset view">Reset</button>
    </span>

    <span class="spacer"></span>
    <span class="statuschip" id="saveStatus"></span>
    <button id="exportBtn">⬇ Export</button>
    <button id="importBtn">⬆ Import</button>
    <input type="file" id="importFile" accept="application/json" style="display:none">
    <button id="newMapBtn" class="danger">New</button>
  </div>

  <div id="main">
    <div id="viewport">
      <canvas id="gridcanvas"></canvas>
      <div id="world">
        <svg id="svglayer"></svg>
        <!-- rooms injected here -->
      </div>
    </div>

    <canvas id="canvas3d"></canvas>

    <div id="inspector"></div>
  </div>
</div>

<div id="dirpicker">
  <div class="hdr" id="dirHdr">Link direction</div>
  <div class="grid3" id="dirGrid"></div>
</div>

<div id="pathResult"></div>

<div id="legendPanel" class="popover">
  <div class="pop-hdr">Colour tags <button class="popclose" data-close="legendPanel">✕</button></div>
  <div id="legendRows"></div>
</div>

<div id="onionPanel" class="popover">
  <div class="pop-hdr">Onion-skin <button class="popclose" data-close="onionPanel">✕</button></div>
  <label class="poprow"><input type="checkbox" id="onionBelow"> Show layer below</label>
  <label class="poprow"><input type="checkbox" id="onionAbove"> Show layer above</label>
  <label class="poprow">Opacity <input type="range" id="onionOpacity" min="0.1" max="0.6" step="0.05"></label>
</div>

<div id="statsPanel" class="popover">
  <div class="pop-hdr">Map stats <button class="popclose" data-close="statsPanel">✕</button></div>
  <div id="statsBody"></div>
</div>

<div id="exportPanel" class="popover">
  <div class="pop-hdr">Export map <button class="popclose" data-close="exportPanel">✕</button></div>
  <div class="expsec"><div class="explabel">Layers</div><div id="expLayers" class="checklist"></div></div>
  <div class="expsec"><div class="explabel">Areas <span class="hint">(none = whole map)</span></div><div id="expAreas" class="checklist"></div></div>
  <div class="expsec"><div class="explabel">Exclude from export</div>
    <label class="poprow"><input type="checkbox" id="expStripNames"> Room names</label>
    <label class="poprow"><input type="checkbox" id="expStripDesc"> Descriptions / notes</label>
    <label class="poprow"><input type="checkbox" id="expStripColor"> Colour tags</label>
  </div>
  <div class="expsec"><div class="explabel">Label (optional)</div>
    <input type="text" id="expTitle" placeholder="Map title" style="width:100%;margin-bottom:5px;">
    <input type="text" id="expAuthor" placeholder="Author / seller" style="width:100%;">
  </div>
  <div class="expcount" id="expCount"></div>
  <button id="expDo" class="primary" style="width:100%;">⬇ Export selection</button>
</div>

<div id="importPanel" class="popover">
  <div class="pop-hdr">Import map <button class="popclose" data-close="importPanel">✕</button></div>
  <div id="importSummary"></div>
  <button id="importAdd" class="primary" style="width:100%;margin-bottom:6px;">➕ Add to current map</button>
  <button id="importReplace" class="danger" style="width:100%;">⚠ Replace everything</button>
</div>

<div id="marquee"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
